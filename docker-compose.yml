version: '3.8'

services:
  franklinops:
    build: .
    ports:
      - "8844:8844"
    volumes:
      - ./data:/app/data
    environment:
      - FRANKLINOPS_DATA_DIR=/app/data/franklinops
      - FRANKLINOPS_DB_PATH=/app/data/franklinops/ops.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8844/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
