# Universal Spine — Construction Industry Profile
# Optimized for construction project management and operations

domain: construction
description: Construction industry configuration

# Data storage
data_dir: data/construction
db_path: data/construction/ops.db
audit_jsonl_path: data/construction/audit.jsonl

# LLM configuration
llm:
  ollama_first: true
  ollama_api_url: http://localhost:11434/api/generate
  ollama_model: llama3
  openai_api_key: ""
  openai_model: gpt-4
  openai_temperature: 0.3
  embeddings_model: all-MiniLM-L6-v2

# Governance
governance:
  default_authority_level: SEMI_AUTO
  default_governance_scope: internal
  risk_max_approval_amount: 50000.0
  rate_limit_per_hour: 500
  max_cost_per_mission: 25000.0

# UI and UX
ui:
  enable_proactive_assistance: true
  enable_onboarding_wizard: true
  user_experience_level: intermediate

# Server
server:
  host: 0.0.0.0
  port: 8844

# Security
security:
  rbac_enabled: true
  api_keys: []
  air_gap_mode: false

# Construction-specific features
features:
  - sales_spokes
  - finance_spokes
  - project_controls
  - bidzone
  - grokstmate
  - fleet

# Domain integrations
integrations:
  onedrive: true
  procore: true
  accounting: true
  franklin_os: true
