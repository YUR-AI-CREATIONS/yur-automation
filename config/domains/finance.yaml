# Universal Spine — Finance Domain Profile
# Optimized for financial operations with strict controls

domain: finance
description: Finance industry configuration with high compliance

# Data storage
data_dir: data/finance
db_path: data/finance/spine.db
audit_jsonl_path: data/finance/audit.jsonl

# LLM configuration
llm:
  ollama_first: false
  ollama_api_url: http://localhost:11434/api/generate
  ollama_model: llama3
  openai_api_key: ""
  openai_model: gpt-4
  openai_temperature: 0.1
  embeddings_model: all-MiniLM-L6-v2

# Governance
governance:
  default_authority_level: MANUAL
  default_governance_scope: restricted
  risk_max_approval_amount: 100000.0
  rate_limit_per_hour: 50
  max_cost_per_mission: 50000.0

# UI and UX
ui:
  enable_proactive_assistance: false
  enable_onboarding_wizard: false
  user_experience_level: advanced

# Server
server:
  host: 127.0.0.1
  port: 8844

# Security
security:
  rbac_enabled: true
  api_keys: []
  air_gap_mode: true

# Finance-specific features
features:
  - accounts_payable
  - accounts_receivable
  - cashflow_forecasting
  - invoice_management
  - reconciliation
  - audit_trail

# Compliance requirements
compliance:
  sox_enabled: true
  audit_retention_days: 2555
  encryption_required: true
  mfa_required: true
