# Universal Spine — Healthcare Domain Profile
# Optimized for healthcare operations with compliance and security focus

domain: healthcare
description: Healthcare industry configuration with HIPAA/compliance focus

# Data storage
data_dir: data/healthcare
db_path: data/healthcare/spine.db
audit_jsonl_path: data/healthcare/audit.jsonl

# LLM configuration
llm:
  ollama_first: true
  ollama_api_url: http://localhost:11434/api/generate
  ollama_model: llama3
  openai_api_key: ""
  openai_model: gpt-4
  openai_temperature: 0.2
  embeddings_model: all-MiniLM-L6-v2

# Governance
governance:
  default_authority_level: SEMI_AUTO
  default_governance_scope: restricted
  risk_max_approval_amount: 10000.0
  rate_limit_per_hour: 100
  max_cost_per_mission: 5000.0

# UI and UX
ui:
  enable_proactive_assistance: true
  enable_onboarding_wizard: true
  user_experience_level: advanced

# Server
server:
  host: 127.0.0.1
  port: 8844

# Security
security:
  rbac_enabled: true
  api_keys: []
  air_gap_mode: true

# Healthcare-specific features
features:
  - compliance_audit
  - hipaa_logging
  - patient_data_protection
  - clinical_workflows
  - scheduling

# Compliance requirements
compliance:
  hipaa_enabled: true
  audit_retention_days: 2555
  encryption_required: true
